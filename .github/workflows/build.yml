name: build

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install nuitka pydivert
      - name: Build with Nuitka
        shell: pwsh
        run: |
          $ddir = python -c "import pydivert, os; print(os.path.join(os.path.dirname(pydivert.__file__), 'windivert_dll'))"
          Write-Host "windivert_dll = $ddir"
          Get-ChildItem $ddir   # proves the .dll/.sys exist on the runner before bundling
          python -m nuitka --onefile --assume-yes-for-downloads `
            --include-data-files="$ddir\WinDivert64.dll=pydivert/windivert_dll/WinDivert64.dll" `
            --include-data-files="$ddir\WinDivert64.sys=pydivert/windivert_dll/WinDivert64.sys" `
            --output-filename=vic2hostguard-win.exe win_main.py
      - uses: actions/upload-artifact@v4
        with:
          name: vic2hostguard-windows
          path: vic2hostguard-win.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libnetfilter-queue-dev patchelf
      - name: Install dependencies
        run: pip install nuitka NetfilterQueue
      - name: Build with Nuitka
        run: >
          python -m nuitka --onefile --assume-yes-for-downloads
          --output-filename=vic2hostguard-linux linux_main.py
      - uses: actions/upload-artifact@v4
        with:
          name: vic2hostguard-linux
          path: vic2hostguard-linux

  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vic2hostguard-windows/vic2hostguard-win.exe
            artifacts/vic2hostguard-linux/vic2hostguard-linux
